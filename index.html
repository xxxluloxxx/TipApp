<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    <title>TipApp</title>
    <!--
      Aplica el tema cacheado ANTES de que Vue monte (evita el flash de tema
      equivocado al recargar, sección 4.4 de theme-toggle-ux.md). Un script
      module (como src/main.ts) se ejecuta diferido, después de que el
      parser ya llegó al <body> — con eso alcanza a haber un primer paint en
      claro antes de aplicar `.dark`. Este script inline y bloqueante corre
      antes de eso, apenas el parser llega acá. La clave de localStorage
      ('tipapp:theme-preference') debe mantenerse igual a THEME_STORAGE_KEY
      en src/stores/auth.ts.
    -->
    <script>
      (function () {
        var isDark = false
        try {
          var pref = localStorage.getItem('tipapp:theme-preference')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          isDark = pref === 'dark' || (pref !== 'light' && prefersDark)
          if (isDark) document.documentElement.classList.add('dark')
        } catch (e) {
          // localStorage/matchMedia no disponibles (privacy mode, etc.):
          // no hay nada que cachear, se queda en el tema claro por defecto.
        }

        // Color de acento cacheado (docs/features/accent-color-ux.md): mismo
        // objetivo que el bloque de arriba, evitar el flash del azul de
        // fábrica antes del primer paint mientras se resuelve el perfil
        // remoto. La conversión hex→HSL de acá es una duplicación
        // DELIBERADA del mismo algoritmo de `src/lib/colors.ts`
        // (`hexToHslTriple`/`rgbToHsl`) y del cálculo de contraste de
        // `readableTextColor`: este script es JS plano sin build, corre
        // antes de que Vite/Vue existan, y no puede importar ese módulo —
        // mismo tipo de trade-off que ya aceptó el proyecto para el bloque
        // de tema de arriba. Si se cambia alguno de esos algoritmos en
        // `colors.ts`, replicar el cambio acá también. La clave de
        // localStorage ('tipapp:accent-color') debe mantenerse igual a
        // ACCENT_STORAGE_KEY en `src/stores/auth.ts`.
        try {
          var accentHex = localStorage.getItem('tipapp:accent-color')
          if (accentHex && /^#[0-9a-f]{6}$/i.test(accentHex)) {
            var root = document.documentElement
            var primaryHsl = hexToHslInline(accentHex)
            root.style.setProperty('--primary', primaryHsl.h + ' ' + primaryHsl.s + '% ' + primaryHsl.l + '%')

            var foregroundHex = readableTextColorInline(accentHex)
            var foregroundHsl = hexToHslInline(foregroundHex)
            root.style.setProperty('--primary-foreground', foregroundHsl.h + ' ' + foregroundHsl.s + '% ' + foregroundHsl.l + '%')

            // Mismo criterio que `applyAccentToDom` en `src/stores/auth.ts`:
            // en modo oscuro se aplica un piso de lightness de 65% para que
            // el anillo de foco siga siendo visible (mismo valor que el
            // `--ring` fijo de dark en `main.css`).
            var ringL = isDark ? Math.max(primaryHsl.l, 65) : primaryHsl.l
            root.style.setProperty('--ring', primaryHsl.h + ' ' + primaryHsl.s + '% ' + ringL + '%')
          }
        } catch (e) {
          // Igual que arriba: sin acento cacheado o localStorage no
          // disponible, se queda con el azul de fábrica de `main.css`.
        }

        function hexToHslInline(hex) {
          var r = parseInt(hex.slice(1, 3), 16) / 255
          var g = parseInt(hex.slice(3, 5), 16) / 255
          var b = parseInt(hex.slice(5, 7), 16) / 255
          var max = Math.max(r, g, b)
          var min = Math.min(r, g, b)
          var l = (max + min) / 2
          var h = 0
          var s = 0
          if (max !== min) {
            var d = max - min
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min)
            if (max === r) h = (g - b) / d + (g < b ? 6 : 0)
            else if (max === g) h = (b - r) / d + 2
            else h = (r - g) / d + 4
            h *= 60
          }
          return {
            h: Math.round(h * 10) / 10,
            s: Math.round(s * 1000) / 10,
            l: Math.round(l * 1000) / 10,
          }
        }

        function readableTextColorInline(hex) {
          var r = parseInt(hex.slice(1, 3), 16)
          var g = parseInt(hex.slice(3, 5), 16)
          var b = parseInt(hex.slice(5, 7), 16)
          function channel(value) {
            var srgb = value / 255
            return srgb <= 0.03928 ? srgb / 12.92 : Math.pow((srgb + 0.055) / 1.055, 2.4)
          }
          var luminance = 0.2126 * channel(r) + 0.7152 * channel(g) + 0.0722 * channel(b)
          return luminance > 0.42 ? '#111827' : '#ffffff'
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
